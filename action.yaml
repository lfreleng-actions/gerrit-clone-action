---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 Matthew Watkins <mwatkins@linuxfoundation.org>

name: "🔄 Gerrit Clone Action"
description: >
  Bulk clone repositories from Gerrit servers with multi-threading and
  retry logic
author: "Matthew Watkins <mwatkins@linuxfoundation.org>"

inputs:
  host:
    description: >-
      Source hostname (Gerrit server or GitHub host, e.g.
      github.com or github.com/ORG)
    required: true
  port:
    description: "Gerrit SSH port"
    required: false
    default: "29418"
  ssh-user:
    description: "SSH username for clone operations"
    required: false
  ssh-private-key:
    description: "SSH private key content for authentication"
    required: false
  source-type:
    description: >-
      Source type: gerrit or github (auto-detected from host)
    required: false
  github-token:
    description: >-
      GitHub personal access token for API access and private
      repos
    required: false
  github-org:
    description: >-
      GitHub organization or user (auto-detected from host)
    required: false
  use-gh-cli:
    description: >-
      Use GitHub CLI (gh) for cloning instead of git
    required: false
    default: "false"
  base-url:
    description: "Base URL for Gerrit API (defaults to https://HOST)"
    required: false
  output-path:
    description: >-
      Clone destination (default: auto-creates ./{SERVER}/ or
      ./github.com/{ORG}/ structure)
    required: false
    default: "."
  skip-archived:
    description: "Skip archived/read-only repositories"
    required: false
    default: "true"
  include-projects:
    description: >-
      Restrict cloning to specific project(s). Supports shell-style wildcards
      (*, ?, [seq]), hierarchical matching (e.g. 'ccsdk' includes ccsdk/apps),
      and comma or space-separated lists.
    required: false
  exclude-projects:
    description: >-
      Exclude specific project(s) from cloning. Applied after include filters.
      Supports shell-style wildcards (*, ?, [seq]), hierarchical matching,
      and comma or space-separated lists.
    required: false
  ssh-debug:
    description: >-
      Enable verbose SSH (-vvv) for troubleshooting authentication
    required: false
    default: "false"
  allow-nested-git:
    description: >-
      Allow nested git working trees when cloning both parent and child
      repositories
    required: false
    default: "true"
  nested-protection:
    description: >-
      Auto-add nested child repo paths to parent .git/info/exclude
    required: false
    default: "true"
  move-conflicting:
    description: >-
      Move conflicting files/directories in parent repos to allow nested cloning
    required: false
    default: "true"
  exit-on-error:
    description: >-
      Exit cloning immediately when the first error occurs (for debugging)
    required: false
    default: "false"
  no-refresh:
    description: >-
      Skip refreshing existing repositories
    required: false
    default: "false"
  force-refresh:
    description: >-
      Force refresh all existing repos (auto-stash, fix detached
      HEAD)
    required: false
    default: "false"
  fetch-only:
    description: "Only fetch changes without merging (existing repos)"
    required: false
    default: "false"
  skip-conflicts:
    description: >-
      Skip repos with uncommitted changes during refresh
    required: false
    default: "true"

  threads:
    description: "Number of concurrent clone threads"
    required: false
  depth:
    description: "Create shallow clone with given depth"
    required: false
  branch:
    description: "Clone specific branch instead of default"
    required: false
  mirror:
    description: >-
      Use git clone --mirror for complete repository metadata (all refs,
      tags, branches). Creates bare repository. Incompatible with depth
      and branch options.
    required: false
    default: "true"
  set-default-branch:
    description: >-
      After pushing to GitHub, set the default branch to match the HEAD
      symbolic ref from the Gerrit clone (default: enabled). Gerrit
      parent projects (HEAD → refs/meta/config, no code branches) are
      detected and skipped with an informational message.
    required: false
    default: "true"
  fix-default-branch:
    description: >-
      After syncing, repair any existing GitHub repositories that have
      no default branch configured (default: enabled). Gerrit parent
      projects are identified and logged at INFO level rather than
      flagged as errors. Real repositories whose previous push failed
      are fixed by selecting the best candidate branch.
    required: false
    default: "true"
  use-https:
    description: "Use HTTPS for cloning instead of SSH"
    required: false
    default: "false"
  http-user:
    description: "HTTP username for Gerrit HTTPS authentication"
    required: false
  http-password:
    description: "HTTP password for Gerrit HTTPS authentication"
    required: false
  no-netrc:
    description: "Disable .netrc credential lookup for HTTP auth"
    required: false
    default: "false"
  netrc-file:
    description: "Explicit path to .netrc file for HTTP credentials"
    required: false
  netrc-optional:
    description: >-
      Whether missing .netrc is acceptable (false = fail if not
      found)
    required: false
    default: "true"
  discovery-method:
    description: >-
      Discovery method: ssh, http, both, or github_api. Leave empty to
      derive from the clone protocol (http with use-https, otherwise ssh;
      github_api for GitHub sources).
    required: false
    default: ""
  keep-remote-protocol:
    description: "Preserve original protocol for remote (default: SSH)"
    required: false
    default: "false"
  strict-host:
    description: "SSH strict host key checking"
    required: false
    default: "true"
  clone-timeout:
    description: "Timeout per clone operation in seconds"
    required: false
    default: "600"
  retry-attempts:
    description: "Maximum retry attempts per repository"
    required: false
    default: "3"
  retry-base-delay:
    description: "Base delay for retry backoff in seconds"
    required: false
    default: "2.0"
  retry-factor:
    description: "Exponential backoff factor for retries"
    required: false
    default: "2.0"
  retry-max-delay:
    description: "Maximum retry delay in seconds"
    required: false
    default: "30.0"
  manifest-filename:
    description: "Output manifest filename"
    required: false
    default: "clone-manifest.json"
  config-file:
    description: "Configuration file path (YAML or JSON)"
    required: false
  verbose:
    description: "Enable verbose/debug output"
    required: false
    default: "false"
  quiet:
    description: "Suppress all output except errors"
    required: false
    default: "false"
  log-file:
    description: >-
      Custom log file path (default: gerrit-clone.log in current directory)
    required: false
  disable-log-file:
    description: "Disable creation of log file"
    required: false
    default: "false"
  log-level:
    description: "File logging level (DEBUG, INFO, WARNING, ERROR, CRITICAL)"
    required: false
    default: "DEBUG"
  build-from-source:
    description: >-
      Build CLI from the action's own source instead of
      installing from PyPI (useful for testing unreleased code)
    required: false
    default: "false"

outputs:
  manifest-path:
    description: "Path to the generated clone manifest file"
    value: ${{ steps.clone.outputs.manifest-path }}
  success-count:
    description: "Number of successfully cloned repositories"
    value: ${{ steps.clone.outputs.success-count }}
  failure-count:
    description: "Number of failed clone attempts"
    value: ${{ steps.clone.outputs.failure-count }}
  total-count:
    description: "Total number of repositories processed"
    value: ${{ steps.clone.outputs.total-count }}
  skipped-count:
    description: "Number of skipped repositories"
    value: ${{ steps.clone.outputs.skipped-count }}
  already-exists-count:
    description: "Number of repos that already existed (not refreshed)"
    value: ${{ steps.clone.outputs.already-exists-count }}
  refreshed-count:
    description: "Number of existing repos that were refreshed"
    value: ${{ steps.clone.outputs.refreshed-count }}
  verified-count:
    description: "Number of repos verified as up-to-date"
    value: ${{ steps.clone.outputs.verified-count }}
  duration:
    description: "Total duration of the operation in seconds"
    value: ${{ steps.clone.outputs.duration }}
  success-rate:
    description: "Success rate as a percentage"
    value: ${{ steps.clone.outputs.success-rate }}

runs:
  using: "composite"
  steps:
    - name: "Validate inputs"
      shell: bash
      env:
        INPUT_HOST: ${{ inputs.host }}
        INPUT_VERBOSE: ${{ inputs.verbose }}
        INPUT_QUIET: ${{ inputs.quiet }}
        INPUT_USE_HTTPS: ${{ inputs.use-https }}
      run: |
        if [ -z "${INPUT_HOST}" ]; then
          echo "::error::host input is required"
          exit 1
        fi

        # Validate mutually exclusive options
        if [ "${INPUT_VERBOSE}" = "true" ] && \
          [ "${INPUT_QUIET}" = "true" ]; then
          echo "::error::verbose and quiet options cannot be used together"
          exit 1
        fi

        echo "Gerrit host: ${INPUT_HOST}"
        echo "DEBUG: use-https input value: '${INPUT_USE_HTTPS}'"

    - name: "Setup SSH authentication"
      if: ${{ inputs.use-https != 'true' }}
      shell: bash
      run: |
        # Extract bare hostname (strip path like /ORG from github.com/ORG)
        SSH_HOST="${INPUT_HOST}"
        SSH_HOST="${SSH_HOST%%/*}"

        if [ -n "${INPUT_SSH_PRIVATE_KEY}" ]; then
          echo "Setting up SSH agent with private key"

          # Start SSH agent and add key (never touches disk)
          echo "Starting SSH agent..."

          # Clean up any existing socket first
          if [ -S "$SSH_AUTH_SOCK" ]; then
            echo "Cleaning up existing SSH agent socket..."
            rm -f "$SSH_AUTH_SOCK"
          fi

          ssh-agent -a "$SSH_AUTH_SOCK" > /dev/null || {
            echo "Failed to start SSH agent"
            exit 1
          }

          echo "Adding private key to SSH agent..."
          echo "${INPUT_SSH_PRIVATE_KEY}" | ssh-add - || {
            echo "Failed to add private key to SSH agent"
            exit 1
          }

          echo "SSH agent setup complete, keys loaded:"
          ssh-add -l

          # Setup known_hosts to avoid prompts
          echo "Setting up known_hosts for $SSH_HOST..."
          mkdir -p ~/.ssh

          # Try to scan SSH host keys with proper port and timeout
          PORT="${INPUT_PORT}"
          if [ -z "$PORT" ]; then
            PORT="29418"
          fi

          echo "Scanning SSH keys for $SSH_HOST:$PORT..."
          if timeout 30 ssh-keyscan -H -p "$PORT" \
            "$SSH_HOST" >> ~/.ssh/known_hosts 2>&1; then
            echo "Successfully added $SSH_HOST to known_hosts"
          else
            echo "Warning: Could not scan SSH keys for $SSH_HOST:$PORT"
            echo "Continuing with strict host checking disabled"
          fi
        else
          echo "No SSH private key provided, using default SSH setup"
        fi
      env:
        SSH_AUTH_SOCK: /tmp/ssh_agent_${{ github.run_id }}.sock
        INPUT_HOST: ${{ inputs.host }}
        INPUT_SSH_PRIVATE_KEY: ${{ inputs.ssh-private-key }}
        INPUT_PORT: ${{ inputs.port }}

    - name: "Install and setup gerrit-clone CLI"
      shell: bash
      env:
        INPUT_BUILD_FROM_SOURCE: ${{ inputs.build-from-source }}
      # The only $GITHUB_PATH write below appends a path under the
      # runner-provided $HOME ("$HOME/.local/bin") so the gerrit-clone
      # wrapper is on PATH for the subsequent clone step; the value is
      # not derived from any action input or other user-controllable
      # source.
      run: | # zizmor: ignore[github-env]
        # Check if gerrit-clone is already installed (from workflow setup)
        if command -v gerrit-clone &> /dev/null; then
          echo "gerrit-clone CLI is already available"
          gerrit-clone --version
        else
          # Install uv if not available
          if ! command -v uv &> /dev/null; then
            echo "Installing uv..."
            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="$HOME/.cargo/bin:$PATH"
          fi

          if [ "${INPUT_BUILD_FROM_SOURCE}" = "true" ]; then
            # Build and install from the action's own source tree
            echo "Building gerrit-clone from source..."
            echo "Source path: $GITHUB_ACTION_PATH"
            uv tool install "$GITHUB_ACTION_PATH"
          else
            # Install from PyPI using uvx (isolated environment)
            echo "Installing gerrit-clone from PyPI..."
            uvx gerrit-clone --help > /dev/null || {
              echo "Failed to install gerrit-clone via uvx"
              exit 1
            }

            # Create wrapper so gerrit-clone is available in PATH
            mkdir -p "$HOME/.local/bin"
            printf '#!/bin/bash\nexec uvx gerrit-clone "$@"\n' \
              > "$HOME/.local/bin/gerrit-clone"
            chmod +x "$HOME/.local/bin/gerrit-clone"
            export PATH="$HOME/.local/bin:$PATH"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

          # Verify installation
          gerrit-clone --version
        fi

    - name: "Clone repositories"
      id: clone
      shell: bash
      env:
        INPUT_INCLUDE_PROJECTS: ${{ inputs.include-projects }}
        INPUT_EXCLUDE_PROJECTS: ${{ inputs.exclude-projects }}
        INPUT_HOST: ${{ inputs.host }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_HTTP_PASSWORD: ${{ inputs.http-password }}
        INPUT_USE_HTTPS: ${{ inputs.use-https }}
        INPUT_SSH_USER: ${{ inputs.ssh-user }}
        # Only a boolean is needed here (the key material itself is
        # consumed by the earlier SSH-agent setup step); avoid placing
        # the private key in this step's environment.
        INPUT_SSH_KEY_PROVIDED: ${{ inputs.ssh-private-key != '' }}
        INPUT_PORT: ${{ inputs.port }}
        INPUT_SOURCE_TYPE: ${{ inputs.source-type }}
        INPUT_GITHUB_ORG: ${{ inputs.github-org }}
        INPUT_USE_GH_CLI: ${{ inputs.use-gh-cli }}
        INPUT_BASE_URL: ${{ inputs.base-url }}
        INPUT_OUTPUT_PATH: ${{ inputs.output-path }}
        INPUT_SKIP_ARCHIVED: ${{ inputs.skip-archived }}
        INPUT_THREADS: ${{ inputs.threads }}
        INPUT_DEPTH: ${{ inputs.depth }}
        INPUT_BRANCH: ${{ inputs.branch }}
        INPUT_MIRROR: ${{ inputs.mirror }}
        INPUT_HTTP_USER: ${{ inputs.http-user }}
        INPUT_NO_NETRC: ${{ inputs.no-netrc }}
        INPUT_NETRC_FILE: ${{ inputs.netrc-file }}
        INPUT_NETRC_OPTIONAL: ${{ inputs.netrc-optional }}
        INPUT_DISCOVERY_METHOD: ${{ inputs.discovery-method }}
        INPUT_KEEP_REMOTE_PROTOCOL: ${{ inputs.keep-remote-protocol }}
        INPUT_STRICT_HOST: ${{ inputs.strict-host }}
        INPUT_CLONE_TIMEOUT: ${{ inputs.clone-timeout }}
        INPUT_RETRY_ATTEMPTS: ${{ inputs.retry-attempts }}
        INPUT_RETRY_BASE_DELAY: ${{ inputs.retry-base-delay }}
        INPUT_CONFIG_FILE: ${{ inputs.config-file }}
        INPUT_SSH_DEBUG: ${{ inputs.ssh-debug }}
        INPUT_ALLOW_NESTED_GIT: ${{ inputs.allow-nested-git }}
        INPUT_NESTED_PROTECTION: ${{ inputs.nested-protection }}
        INPUT_MOVE_CONFLICTING: ${{ inputs.move-conflicting }}
        INPUT_EXIT_ON_ERROR: ${{ inputs.exit-on-error }}
        INPUT_NO_REFRESH: ${{ inputs.no-refresh }}
        INPUT_FORCE_REFRESH: ${{ inputs.force-refresh }}
        INPUT_FETCH_ONLY: ${{ inputs.fetch-only }}
        INPUT_SKIP_CONFLICTS: ${{ inputs.skip-conflicts }}
        INPUT_RETRY_FACTOR: ${{ inputs.retry-factor }}
        INPUT_RETRY_MAX_DELAY: ${{ inputs.retry-max-delay }}
        INPUT_MANIFEST_FILENAME: ${{ inputs.manifest-filename }}
        INPUT_VERBOSE: ${{ inputs.verbose }}
        INPUT_QUIET: ${{ inputs.quiet }}
        INPUT_LOG_FILE: ${{ inputs.log-file }}
        INPUT_DISABLE_LOG_FILE: ${{ inputs.disable-log-file }}
        INPUT_LOG_LEVEL: ${{ inputs.log-level }}
      run: |
        # WARNING: Do NOT use literal empty expression syntax (dollar
        # brace-brace with nothing inside) anywhere in this run block,
        # including in comments. The GitHub Actions template engine
        # parses ALL expression patterns in run blocks and rejects
        # empty ones with "An expression was expected".

        # Use action-managed SSH agent socket if it exists; otherwise,
        # fall back to any existing SSH_AUTH_SOCK on the runner so that
        # SSH-based clones using the runner's default agent/keys still work.
        SSH_AGENT_SOCK="/tmp/ssh_agent_${{ github.run_id }}.sock"
        if [ -S "$SSH_AGENT_SOCK" ]; then
          export SSH_AUTH_SOCK="$SSH_AGENT_SOCK"
        fi

        # Extract bare hostname (strip path like /ORG from github.com/ORG)
        SSH_HOST="${INPUT_HOST}"
        SSH_HOST="${SSH_HOST%%/*}"

        # Export secrets as env vars (keeps them off the cmd line)
        if [ -n "${INPUT_GITHUB_TOKEN}" ]; then
          export GERRIT_CLONE_TOKEN="${INPUT_GITHUB_TOKEN}"
        fi
        if [ -n "${INPUT_HTTP_PASSWORD}" ]; then
          export GERRIT_HTTP_PASSWORD="${INPUT_HTTP_PASSWORD}"
        fi

        # Debug protocol selection
        echo "DEBUG: Protocol selection - use-https: '${INPUT_USE_HTTPS}'"
        if [ "${INPUT_USE_HTTPS}" = "true" ]; then
          echo "Using HTTPS for cloning"
        else
          echo "Using SSH for cloning"
          # Debug SSH agent status
          echo "Checking SSH agent status..."
          if [ -n "$SSH_AUTH_SOCK" ]; then
            echo "SSH_AUTH_SOCK is set to: $SSH_AUTH_SOCK"
            if ssh-add -l >/dev/null 2>&1; then
              echo "SSH keys are available:"
              ssh-add -l
            else
              echo "Warning: SSH agent running but no keys loaded"
            fi
          else
            echo "SSH_AUTH_SOCK not set - using default SSH behavior"
          fi

          # Test SSH connection if using SSH authentication
          if [ -n "${INPUT_SSH_USER}" ] && \
            [ "${INPUT_SSH_KEY_PROVIDED}" = "true" ]; then
            echo "Testing SSH connection to $SSH_HOST..."
            PORT="${INPUT_PORT}"
            if [ -z "$PORT" ]; then
              PORT="29418"
            fi

            if timeout 10 ssh -o BatchMode=yes -o ConnectTimeout=5 \
                -p "$PORT" "${INPUT_SSH_USER}@$SSH_HOST" \
                gerrit version >/dev/null 2>&1; then
              echo "SSH connection test successful"
            else
              echo "Warning: SSH connection test failed, but continuing..."
            fi
          fi
        fi

        # Build gerrit-clone command as a bash array
        # (avoids eval and quoting/injection issues)
        cmd=(gerrit-clone clone)
        cmd+=(--host "${INPUT_HOST}")

        # GitHub source options
        if [ -n "${INPUT_SOURCE_TYPE}" ]; then
          cmd+=(--source-type "${INPUT_SOURCE_TYPE}")
        fi
        if [ -n "${INPUT_GITHUB_ORG}" ]; then
          cmd+=(--github-org "${INPUT_GITHUB_ORG}")
        fi
        # github-token passed via GERRIT_CLONE_TOKEN env var
        if [ "${INPUT_USE_GH_CLI}" = "true" ]; then
          cmd+=(--use-gh-cli)
        fi

        # Port applies to both SSH and HTTPS
        # (CLI auto-adjusts 29418→443 for HTTPS)
        cmd+=(--port "${INPUT_PORT}")

        # SSH-specific parameters only when not using HTTPS
        if [ "${INPUT_USE_HTTPS}" != "true" ]; then
          if [ -n "${INPUT_SSH_USER}" ]; then
            cmd+=(--ssh-user "${INPUT_SSH_USER}")
          fi
        fi

        if [ -n "${INPUT_BASE_URL}" ]; then
          cmd+=(--base-url "${INPUT_BASE_URL}")
        fi

        # SSH private key handled by SSH agent setup step

        cmd+=(--output-path "${INPUT_OUTPUT_PATH}")

        if [ "${INPUT_SKIP_ARCHIVED}" = "true" ]; then
          cmd+=(--skip-archived)
        else
          cmd+=(--include-archived)
        fi

        if [ -n "${INPUT_THREADS}" ]; then
          cmd+=(--threads "${INPUT_THREADS}")
        fi

        if [ -n "${INPUT_DEPTH}" ]; then
          cmd+=(--depth "${INPUT_DEPTH}")
        fi

        if [ -n "${INPUT_BRANCH}" ]; then
          cmd+=(--branch "${INPUT_BRANCH}")
        fi

        if [ "${INPUT_MIRROR}" = "false" ]; then
          cmd+=(--no-mirror)
        else
          cmd+=(--mirror)
        fi

        if [ "${INPUT_USE_HTTPS}" = "true" ]; then
          cmd+=(--https)
        else
          cmd+=(--ssh)
        fi

        # HTTPS authentication options
        if [ "${INPUT_USE_HTTPS}" = "true" ]; then
          if [ -n "${INPUT_HTTP_USER}" ]; then
            cmd+=(--http-user "${INPUT_HTTP_USER}")
          fi
          # http-password passed via GERRIT_HTTP_PASSWORD env var
          if [ "${INPUT_NO_NETRC}" = "true" ]; then
            cmd+=(--no-netrc)
          fi
          if [ -n "${INPUT_NETRC_FILE}" ]; then
            cmd+=(--netrc-file "${INPUT_NETRC_FILE}")
          fi
          if [ "${INPUT_NETRC_OPTIONAL}" = "false" ]; then
            cmd+=(--netrc-required)
          fi
        fi

        # Discovery method (when empty, the CLI derives it from the clone
        # protocol, keeping discovery and cloning consistent).
        if [ -n "${INPUT_DISCOVERY_METHOD}" ]; then
          cmd+=(--discovery-method \
            "${INPUT_DISCOVERY_METHOD}")
        fi

        if [ "${INPUT_KEEP_REMOTE_PROTOCOL}" = "true" ]; then
          cmd+=(--keep-remote-protocol)
        fi

        # SSH host checking only applies when using SSH
        if [ "${INPUT_USE_HTTPS}" != "true" ]; then
          if [ "${INPUT_STRICT_HOST}" = "true" ]; then
            cmd+=(--strict-host)
          else
            cmd+=(--accept-unknown-host)
          fi
        fi

        cmd+=(--clone-timeout "${INPUT_CLONE_TIMEOUT}")
        cmd+=(--retry-attempts "${INPUT_RETRY_ATTEMPTS}")
        cmd+=(--retry-base-delay \
          "${INPUT_RETRY_BASE_DELAY}")

        if [ -n "${INPUT_CONFIG_FILE}" ]; then
          cmd+=(--config-file "${INPUT_CONFIG_FILE}")
        fi

        # Add include-projects options (supports multiple)
        # Use env var to avoid shell injection from expression
        # interpolation in command substitutions; normalize
        # commas to spaces.
        if [ -n "$INPUT_INCLUDE_PROJECTS" ]; then
          read -ra PROJECTS \
            <<< "$(printf '%s' "$INPUT_INCLUDE_PROJECTS" | tr ',' ' ')"
          for project in "${PROJECTS[@]}"; do
            if [ -n "$project" ]; then
              cmd+=(--include-projects "$project")
            fi
          done
        fi

        # Add exclude-projects options (supports multiple)
        # Use env var to avoid shell injection from expression
        # interpolation in command substitutions; normalize
        # commas to spaces.
        if [ -n "$INPUT_EXCLUDE_PROJECTS" ]; then
          read -ra EXCLUDES \
            <<< "$(printf '%s' "$INPUT_EXCLUDE_PROJECTS" | tr ',' ' ')"
          for project in "${EXCLUDES[@]}"; do
            if [ -n "$project" ]; then
              cmd+=(--exclude-projects "$project")
            fi
          done
        fi

        if [ "${INPUT_SSH_DEBUG}" = "true" ]; then
          cmd+=(--ssh-debug)
        fi

        if [ "${INPUT_ALLOW_NESTED_GIT}" = "true" ]; then
          cmd+=(--allow-nested-git)
        else
          cmd+=(--no-allow-nested-git)
        fi

        if [ "${INPUT_NESTED_PROTECTION}" = "true" ]; then
          cmd+=(--nested-protection)
        else
          cmd+=(--no-nested-protection)
        fi

        if [ "${INPUT_MOVE_CONFLICTING}" = "true" ]; then
          cmd+=(--move-conflicting)
        else
          cmd+=(--no-move-conflicting)
        fi

        if [ "${INPUT_EXIT_ON_ERROR}" = "true" ]; then
          cmd+=(--exit-on-error)
        fi

        # Refresh controls for existing repositories
        if [ "${INPUT_NO_REFRESH}" = "true" ]; then
          cmd+=(--no-refresh)
        fi
        if [ "${INPUT_FORCE_REFRESH}" = "true" ]; then
          cmd+=(--force)
        fi
        if [ "${INPUT_FETCH_ONLY}" = "true" ]; then
          cmd+=(--fetch-only)
        fi
        if [ "${INPUT_SKIP_CONFLICTS}" = "true" ]; then
          cmd+=(--skip-conflicts)
        else
          cmd+=(--no-skip-conflicts)
        fi

        cmd+=(--retry-factor "${INPUT_RETRY_FACTOR}")
        cmd+=(--retry-max-delay \
          "${INPUT_RETRY_MAX_DELAY}")
        cmd+=(--manifest-filename \
          "${INPUT_MANIFEST_FILENAME}")

        if [ "${INPUT_VERBOSE}" = "true" ]; then
          cmd+=(--verbose)
        fi

        if [ "${INPUT_QUIET}" = "true" ]; then
          cmd+=(--quiet)
        fi

        # Log file options
        if [ -n "${INPUT_LOG_FILE}" ]; then
          cmd+=(--log-file "${INPUT_LOG_FILE}")
        fi

        if [ "${INPUT_DISABLE_LOG_FILE}" = "true" ]; then
          cmd+=(--disable-log-file)
        fi

        cmd+=(--log-level "${INPUT_LOG_LEVEL}")

        echo "Executing: ${cmd[*]}"

        # Execute and capture exit code.
        # GitHub Actions runs bash with -e, so a bare invocation
        # would terminate the script before exit_code is set.
        exit_code=0
        if ! "${cmd[@]}"; then
          exit_code=$?
        fi

        # Set outputs from manifest file
        # The CLI auto-adjusts the output path
        # (e.g. "./" becomes "./{HOST}/"), so search
        # for the manifest by name within the tree.
        manifest_name="${INPUT_MANIFEST_FILENAME}"
        # Use a slightly higher max depth to handle adjusted paths
        # such as "./github.com/{ORG}/{manifest}".
        manifest_path=$(find "${INPUT_OUTPUT_PATH}" -maxdepth 4 \
          -name "$manifest_name" -type f 2>/dev/null | head -1)

        # Fallback: try the literal path in case find missed it
        if [ -z "$manifest_path" ]; then
          manifest_path="${INPUT_OUTPUT_PATH}/$manifest_name"
        fi

        if [ -f "$manifest_path" ]; then
          echo "manifest-path=$manifest_path" >> "$GITHUB_OUTPUT"

          # Extract counts from manifest JSON
          success_count=$(jq -r '.succeeded // 0' "$manifest_path")
          failure_count=$(jq -r '.failed // 0' "$manifest_path")
          total_count=$(jq -r '.total // 0' "$manifest_path")
          skipped=$(jq -r '.skipped // 0' "$manifest_path")
          already=$(jq -r '.already_exists // 0' "$manifest_path")
          refreshed=$(jq -r '.refreshed // 0' "$manifest_path")
          verified=$(jq -r '.verified // 0' "$manifest_path")
          duration=$(jq -r '.duration_s // 0' "$manifest_path")
          rate=$(jq -r '.success_rate // 0' "$manifest_path")

          echo "success-count=$success_count" >> "$GITHUB_OUTPUT"
          echo "failure-count=$failure_count" >> "$GITHUB_OUTPUT"
          echo "total-count=$total_count" >> "$GITHUB_OUTPUT"
          echo "skipped-count=$skipped" >> "$GITHUB_OUTPUT"
          echo "already-exists-count=$already" >> "$GITHUB_OUTPUT"
          echo "refreshed-count=$refreshed" >> "$GITHUB_OUTPUT"
          echo "verified-count=$verified" >> "$GITHUB_OUTPUT"
          echo "duration=$duration" >> "$GITHUB_OUTPUT"
          echo "success-rate=$rate" >> "$GITHUB_OUTPUT"

          # Add to job summary
          echo "## Gerrit Clone Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Total:** $total_count" >> \
            "$GITHUB_STEP_SUMMARY"
          echo "- **Succeeded:** $success_count" >> \
            "$GITHUB_STEP_SUMMARY"
          echo "- **Failed:** $failure_count" >> \
            "$GITHUB_STEP_SUMMARY"
          echo "- **Skipped:** $skipped" >> \
            "$GITHUB_STEP_SUMMARY"
          echo "- **Refreshed:** $refreshed" >> \
            "$GITHUB_STEP_SUMMARY"
          echo "- **Duration:** ${duration}s" >> \
            "$GITHUB_STEP_SUMMARY"
          echo "- **Success rate:** ${rate}%" >> \
            "$GITHUB_STEP_SUMMARY"
          echo "- **Manifest:** \`$manifest_path\`" >> \
            "$GITHUB_STEP_SUMMARY"
        else
          echo "manifest-path=" >> "$GITHUB_OUTPUT"
          echo "success-count=0" >> "$GITHUB_OUTPUT"
          echo "failure-count=0" >> "$GITHUB_OUTPUT"
          echo "total-count=0" >> "$GITHUB_OUTPUT"
          echo "skipped-count=0" >> "$GITHUB_OUTPUT"
          echo "already-exists-count=0" >> "$GITHUB_OUTPUT"
          echo "refreshed-count=0" >> "$GITHUB_OUTPUT"
          echo "verified-count=0" >> "$GITHUB_OUTPUT"
          echo "duration=0" >> "$GITHUB_OUTPUT"
          echo "success-rate=0" >> "$GITHUB_OUTPUT"
        fi

        exit $exit_code
